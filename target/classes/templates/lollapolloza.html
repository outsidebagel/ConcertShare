<main>
    <div
            class="position-relative overflow-hidden p-3 p-md-5 m-md-3 text-center" id="hero-background"
    >
        <div class="col-md-6 p-lg-5 mx-auto my-5">
            <h1 class="display-3 fw-bold bg-body">Lollapolloza</h1>
            <h3 class="fw-normal text-muted mb-3 bg-body p-2">
                Lollapalooza is an annual American four-day music festival held in Grant Park in Chicago.
            </h3>
            <div class="d-flex gap-3 justify-content-center lead fw-normal">
                <a class="icon-link bg-body p-1" target="_blank" href="https://www.lollapalooza.com/lineup">
                    2026 Artist Lineup
                    <svg class="bi" aria-hidden="true">
                        <use xlink:href="#chevron-right"></use>
                    </svg>
                </a>
                <a class="icon-link bg-body" target="_blank" href="https://support.lollapalooza.com/hc/en-us/articles/4402796125588-Festival-Map">
                    Map
                    <svg class="bi" aria-hidden="true">
                        <use xlink:href="#chevron-right"></use>
                    </svg>
                </a>
            </div>
        </div>
    </div>
    <hr>
    <div class="d-flex justify-content-center gap-3">
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#photoModal" data-bs-whatever="@mdo">Upload Photo</button>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#videoModal" data-bs-whatever="@mdo">Upload Video</button>
    </div>
    <div class="modal fade" id="photoModal" tabindex="-1" aria-labelledby="photoModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="photoModalLabel">Upload Photo</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/lolla/photo/upload}" method="post"
                      enctype="multipart/form-data">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="recipient-name-photo" class="col-form-label">Title:</label>
                            <input type="text" class="form-control" id="recipient-name-photo" name="title">
                        </div>
                        <div class="mb-3">
                            <label for="message-text-photo" class="col-form-label">Caption:</label>
                            <input type="text" class="form-control" id="message-text-photo" name="description">
                        </div>
                        <div class="input-group">
                            <input name="file" type="file" class="form-control" id="inputGroupFile04" aria-describedby="inputGroupFileAddon04" aria-label="Upload">
                        </div>
                    </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Upload Content</button>
                </div>
                </form>
            </div>
        </div>
    </div>
    <div class="modal fade" id="videoModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Upload Video</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/lolla/video/upload}" method="post"
                      enctype="multipart/form-data">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="recipient-name" class="col-form-label">Title</label>
                            <input type="text" class="form-control" id="recipient-name" name="title">
                        </div>
                        <div class="mb-3">
                            <label for="message-text-video" class="col-form-label">Caption</label>
                            <input type="text" class="form-control" id="message-text-video" name="description">
                        </div>
                        <div class="mb-3">
                            <label for="message-text-video2" class="col-form-label">YouTube Link</label>
                            <input type="text" class="form-control" id="message-text-video2" name="videoURL">
                        </div>

                    </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Upload Content</button>
                </div>
                </form>
            </div>
        </div>
    </div>
    <hr>
    <div class="row row-cols-2 my-md-3 ps-md-3">
        <div th:each="entry: ${entries}">
            <div
                    th:if="${entry.getEntryType().toString() == 'PHOTO'}"
                    class="col text-bg-dark pt-3 px-3 pt-md-5 px-md-5 text-center overflow-hidden mt-5"
                    style="width: 50vw"
            >
                <div class="my-3 py-3">
                    <h2 class="display-5" th:text="${entry.getTitle()}">Title</h2>
                    <p class="lead" th:text="${entry.getDescription()}">Desc</p>
                </div>
                <div
                        class="bg-body-tertiary shadow-sm mx-auto"
                        style="width: 80%; height: 100%;"
                >
                    <img th:src="${entry.getRelativePath()}" alt="Northcoast Background" class="w-100" />

                </div>
            </div>
            <div
                    class="col bg-body-tertiary pt-3 px-3 pt-md-5 px-md-5 text-center overflow-hidden mt-5"
                    th:if="${entry.getEntryType().toString() == 'VIDEO'}"
            >
                <div class="my-3 p-3">
                    <h2 class="display-5" th:text="${entry.getTitle()}">Example User Video</h2>
                    <p class="lead" th:text="${entry.getDescription()}">Really Cool Video!</p>
                </div>
                <div
                        class="bg-dark shadow-sm mx-auto"
                        style="width: 100%; height: 100%;"
                >
                    <iframe width="560" height="315" th:src="${entry.getVideoURL()}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>            </div>
            </div>
        </div>
    </div>
</main>
